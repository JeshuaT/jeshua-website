<script>
/* ─── NAV HEIGHT ─────────────────────────────────────────
   Measures the fixed navbar and writes --nav-height so the
   sticky sidebar always starts exactly below it.
   Called on load AND on resize (navbar can reflow).        */
function updateNavHeight() {
  const header = document.querySelector("#quarto-header");
  if (!header) return;
  document.documentElement.style.setProperty(
    "--nav-height",
    header.offsetHeight + "px"
  );
}

/* ─── DOM LAYOUT ─────────────────────────────────────────
   include-before-body puts .site-banner and .profile-sidebar
   INSIDE <main>. We move them to the right DOM positions:

     <body>
       <header>                    ← navbar (fixed)
       <div.site-banner>           ← full-width, body-level
       <div.two-col-wrapper>
         <aside.profile-sidebar>   ← sticky left column
         <div#quarto-content>      ← right column           */
function buildLayout() {
  const header  = document.querySelector("#quarto-header");
  const banner  = document.querySelector(".site-banner");
  const sidebar = document.querySelector(".profile-sidebar");
  const qc      = document.querySelector("#quarto-content");

  if (!header || !banner || !sidebar || !qc) return;

  // 1. Banner → direct child of <body> right after the navbar
  //    (body-level = no parent constrains its width)
  header.insertAdjacentElement("afterend", banner);

  // 2. Create the centred two-column wrapper
  const wrap = document.createElement("div");
  wrap.className = "two-col-wrapper";

  // 3. Insert wrapper where #quarto-content currently sits
  qc.parentNode.insertBefore(wrap, qc);

  // 4. Move sidebar and #quarto-content into the wrapper
  wrap.appendChild(sidebar);
  wrap.appendChild(qc);
}

/* ─── PUBLICATIONS — bold own name ───────────────────── */
function boldOwnName() {
  const refs = document.querySelector("#refs");
  if (!refs) return;
  refs.innerHTML = refs.innerHTML.replace(
    /Tromp,\s+J\./g,
    "<strong>Tromp, J.</strong>"
  );
}

/* ─── DEBOUNCE HELPER ────────────────────────────────── */
function debounce(fn, delay) {
  let timer;
  return function () {
    clearTimeout(timer);
    timer = setTimeout(fn, delay);
  };
}

/* ─── INIT ───────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", function () {
  updateNavHeight();   // set before layout so sticky top is correct immediately
  buildLayout();
  boldOwnName();
});

// Re-measure after all assets (fonts, images) have loaded — navbar
// height can change slightly once web fonts render.
window.addEventListener("load", updateNavHeight);

// Re-measure on resize — the navbar can reflow at different breakpoints.
window.addEventListener("resize", debounce(updateNavHeight, 80));
</script>
